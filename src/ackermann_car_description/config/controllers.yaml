controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

ackermann_steering_controller:
  ros__parameters:
    # 앞바퀴 = 조향 조인트 (position 제어, Ackermann 각도 계산)
    front_wheels_names:
      - front_left_steer_joint
      - front_right_steer_joint

    # 뒷바퀴 (velocity 제어, 주 구동)
    rear_wheels_names:
      - rear_left_wheel_joint
      - rear_right_wheel_joint

    # 차량 치수
    wheelbase: 0.280
    front_wheel_track: 0.260
    rear_wheel_track: 0.260
    front_wheels_radius: 0.065
    rear_wheels_radius: 0.065

    # cmd_vel (geometry_msgs/Twist) 수신 — teleop_twist_keyboard 호환
    use_stamped_vel: false

    # 오도메트리
    open_loop: false
    enable_odom_tf: true
    base_frame_id: base_link
    odom_frame_id: odom
    publish_ackermann_command: false
    position_feedback: false

joint_state_broadcaster:
  ros__parameters: {}
